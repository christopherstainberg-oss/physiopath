name: Publish Docker image to GHCR

# Builds the container and pushes it to GitHub Container Registry (ghcr.io)
# on every push to main. Portainer then pulls ghcr.io/<owner>/physiopath:latest.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Run the headless safety suite first. It loads the REAL planning engine and
  # asserts the invariants that must never regress (age gates, NWB, special
  # precautions, clearance). A red suite blocks the image from shipping.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Run safety suite
        run: npm test
      # The image regenerates every data file at build time (Dockerfile → npm run build),
      # but the safety suite above tests the COMMITTED data. This gate closes that gap:
      # regenerate here (disposable checkout) and fail if anything drifts from what's committed,
      # so "tested" and "shipped" can never diverge (e.g. a generator edited without regenerating).
      - name: Data-drift guard — committed data must match a fresh regeneration
        run: npm run check:drift

  build-and-push:
    needs: test          # never publish an image that fails the safety suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          # lower-cases the owner automatically → ghcr.io/christopherstainberg-oss/physiopath
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
