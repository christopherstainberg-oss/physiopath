name: Publish Docker image to GHCR

# Builds the container and pushes it to GitHub Container Registry (ghcr.io)
# on every push to main. Portainer then pulls ghcr.io/<owner>/physiopath:latest.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Run the headless safety suite first. It loads the REAL planning engine and
  # asserts the invariants that must never regress (age gates, NWB, special
  # precautions, clearance). A red suite blocks the image from shipping.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run safety suite
        run: npm test

  build-and-push:
    needs: test          # never publish an image that fails the safety suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # lower-cases the owner automatically → ghcr.io/christopherstainberg-oss/physiopath
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
